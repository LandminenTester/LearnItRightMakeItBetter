# Dependency-Updates — docs/security/06-secure-development-pipeline.md §1/§3.
# Security-Updates kommen zusätzlich als eigene PRs, sobald Advisories erscheinen.
version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    groups:
      minor-and-patch:
        update-types: ['minor', 'patch']
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'

  - package-ecosystem: docker
    directory: '/infrastructure/docker'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
