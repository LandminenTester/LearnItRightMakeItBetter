# Dependency-Updates — docs/security/06-secure-development-pipeline.md §1/§3.
# Security-Updates kommen zusätzlich als eigene PRs, sobald Advisories erscheinen.
version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    groups:
      minor-and-patch:
        update-types: ['minor', 'patch']
    open-pull-requests-limit: 10
    ignore:
      # TypeScript 7 blockiert durch typescript-eslint@^8 Peer-Dependency (>=4.8.4 <6.1.0)
      # Upgrade möglich erst nach typescript-eslint Major-Update, die TS7 explizit unterstützt
      - dependency-name: typescript
        versions: ['>=6.1.0']

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'

  - package-ecosystem: docker
    directory: '/infrastructure/docker'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
