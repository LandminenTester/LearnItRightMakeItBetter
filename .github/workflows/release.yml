# Release-Pipeline — Docker-Build + Trivy-Scan + SBOM (docs/security/06 §1,
# docs/development-guidelines/03-git-workflow.md §4). Löst das TODO(Release) in ci.yml ab.
# Bild-Signierung (cosign) ist laut docs/security/06 §4 bewusst erst Phase 3.
name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Bestehender Git-Tag, für den Images gebaut werden sollen (z. B. v0.1.0)'
        required: true

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  build-scan-push:
    name: Build · Scan · SBOM · Push (${{ matrix.image }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            dockerfile: infrastructure/docker/Dockerfile.backend
          - image: frontend
            dockerfile: infrastructure/docker/Dockerfile.frontend
    steps:
      - name: Version bestimmen
        id: version
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Registry-Pfad bestimmen (GHCR verlangt lowercase)
        id: registry
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image lokal bauen (noch nicht pushen — erst scannen)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: local/lir-${{ matrix.image }}:${{ steps.version.outputs.tag }}

      - name: Trivy-Scan (docs/security/06 §1 — Fail bei High/Critical mit Fix verfügbar)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: local/lir-${{ matrix.image }}:${{ steps.version.outputs.tag }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: SBOM erzeugen (Syft, SPDX — docs/security/06 §1)
        uses: anchore/sbom-action@v0.24.0
        with:
          image: local/lir-${{ matrix.image }}:${{ steps.version.outputs.tag }}
          format: spdx-json
          output-file: lir-${{ matrix.image }}-${{ steps.version.outputs.tag }}.spdx.json

      - name: Image taggen & nach GHCR pushen
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ steps.registry.outputs.owner }}/lir-${{ matrix.image }}"
          TAG="${{ steps.version.outputs.tag }}"
          docker tag "local/lir-${{ matrix.image }}:$TAG" "$IMAGE:$TAG"
          docker tag "local/lir-${{ matrix.image }}:$TAG" "$IMAGE:latest"
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"

      - name: SBOM an GitHub-Release anhängen
        run: gh release upload "${{ steps.version.outputs.tag }}" "lir-${{ matrix.image }}-${{ steps.version.outputs.tag }}.spdx.json" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
