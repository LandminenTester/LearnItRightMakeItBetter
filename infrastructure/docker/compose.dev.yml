# Dev-Infrastruktur gemäß Fachkonzept §18 / docs/deployment/02-docker-compose.md §2.
# Start: pnpm infra:up · Frontend/Backend laufen auf dem Host (pnpm dev).
name: lir-dev

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: lir
      POSTGRES_PASSWORD: lir
      POSTGRES_DB: lir_dev
    ports:
      - '5432:5432'
    volumes:
      - pg-dev:/var/lib/postgresql/data
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lir -d lir_dev']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes', '--appendfsync', 'everysec']
    ports:
      - '6379:6379'
    volumes:
      - redis-dev:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_MASTER_KEY: dev-master-key-nicht-fuer-produktion
      MEILI_ENV: development
    ports:
      - '7700:7700'
    volumes:
      - meili-dev:/meili_data

  minio:
    image: minio/minio:latest
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: lir-dev
      MINIO_ROOT_PASSWORD: lir-dev-secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-dev:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 lir-dev lir-dev-secret; do sleep 1; done;
      mc mb --ignore-existing local/lir-media;
      exit 0
      "

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web-UI

volumes:
  pg-dev:
  redis-dev:
  meili-dev:
  minio-dev:
