# Produktion Single-Node (Topologie A) — docs/deployment/02-docker-compose.md §3.
# Konfiguration über .env (Vorlage: .env.example, Rechte 600).
# Update-Verfahren & Rollback: docs/deployment/runbooks/upgrade.md.
name: lir

services:
  proxy:
    image: caddy:2-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      LIR_DOMAIN: ${LIR_DOMAIN:?LIR_DOMAIN in .env setzen}
    restart: unless-stopped
    depends_on:
      - frontend
      - backend

  migrate:
    image: ${LIR_BACKEND_IMAGE:-ghcr.io/OWNER/lir-backend}:${LIR_VERSION:?LIR_VERSION in .env setzen}
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.backend
    command: ['node', 'node_modules/prisma/build/index.js', 'migrate', 'deploy']
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  backend:
    image: ${LIR_BACKEND_IMAGE:-ghcr.io/OWNER/lir-backend}:${LIR_VERSION}
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: ${LIR_BACKEND_IMAGE:-ghcr.io/OWNER/lir-backend}:${LIR_VERSION}
    command: ['node', 'dist/worker.js']
    environment:
      WORKER: 'true'
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ${LIR_FRONTEND_IMAGE:-ghcr.io/OWNER/lir-frontend}:${LIR_VERSION}
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.frontend
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lir}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD in .env setzen}
      POSTGRES_DB: ${POSTGRES_DB:-lir}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-lir}']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    # Kein Host-Port — nur internes Netz (Härtungs-Checkliste)

  redis:
    image: redis:7-alpine
    command:
      [
        'redis-server',
        '--requirepass',
        '${REDIS_PASSWORD:?REDIS_PASSWORD in .env setzen}',
        '--appendonly',
        'yes',
        '--appendfsync',
        'everysec',
      ]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?MEILI_MASTER_KEY in .env setzen}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: 'true'
    volumes:
      - meili-data:/meili_data
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
  pg-data:
  redis-data:
  meili-data:
  # media-data nur bei STORAGE_DRIVER=filesystem (dann als Volume am backend/worker mounten)
