packages:
  - apps/*
  - packages/*
  - tests/e2e
# Build-Skripte vertrauenswürdiger Abhängigkeiten (native Binaries/Prebuilds).
# Neue Einträge nur nach Prüfung — Supply-Chain-Regeln: docs/security/06.
allowBuilds:
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@swc/core': true
  argon2: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  sharp: true
  vue-demi: true

# Backlog für geplante Major-Upgrades (nicht in diesem Durchgang):
# 1. ESLint 9→10 + eslint-plugin-vue 9→10 (bereits kompatibel laut peerDeps, niedrigster Aufwand)
# 2. Vitest 3→4 (isoliert testbar, mittlerer Aufwand)
# 3. Nuxt 4 + @nuxtjs/i18n 10 + Pinia 4 + @pinia/nuxt 1 (gekoppeltes Bundle, größter Aufwand wegen Verzeichnisstruktur)
# 4. Prisma 6→7 (Backend-only, unabhängig)
# TypeScript 7 bleibt blockiert durch typescript-eslint Peer-Dependency <6.1.0
minimumReleaseAgeExclude:
  - eslint-plugin-vue@10.10.0
  - '@typescript-eslint/eslint-plugin@8.65.0'
  - '@typescript-eslint/parser@8.65.0'
  - '@typescript-eslint/project-service@8.65.0'
  - '@typescript-eslint/scope-manager@8.65.0'
  - '@typescript-eslint/tsconfig-utils@8.65.0'
  - '@typescript-eslint/type-utils@8.65.0'
  - '@typescript-eslint/types@8.65.0'
  - '@typescript-eslint/typescript-estree@8.65.0'
  - '@typescript-eslint/utils@8.65.0'
  - '@typescript-eslint/visitor-keys@8.65.0'
  - typescript-eslint@8.65.0
