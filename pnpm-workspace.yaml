packages:
  - apps/*
  - packages/*
  - tests/e2e
# Build-Skripte vertrauenswürdiger Abhängigkeiten (native Binaries/Prebuilds).
# Neue Einträge nur nach Prüfung — Supply-Chain-Regeln: docs/security/06.
allowBuilds:
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@swc/core': true
  argon2: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  sharp: true
  vue-demi: true
