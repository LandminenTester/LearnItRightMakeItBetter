packages:
  - apps/*
  - packages/*
  - tests/e2e
# Build-Skripte vertrauenswürdiger Abhängigkeiten (native Binaries/Prebuilds).
# Neue Einträge nur nach Prüfung — Supply-Chain-Regeln: docs/security/06.
allowBuilds:
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@swc/core': true
  argon2: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  sharp: true
  vue-demi: true

# Backlog für geplante Major-Upgrades (nicht in diesem Durchgang):
# 1. Vitest 3→4 (isoliert testbar, mittlerer Aufwand)
# 2. Nuxt 4 + @nuxtjs/i18n 10 + Pinia 4 + @pinia/nuxt 1 (gekoppeltes Bundle, größter Aufwand wegen Verzeichnisstruktur)
# — ESLint 9→10 + eslint-plugin-vue 9→10 + Prisma 6→7 + TypeScript 5.9.3→6.0.3: abgeschlossen
#
# TypeScript 7 bleibt blockiert — Re-Evaluation erst sinnvoll, wenn alle drei Bedingungen erfüllt:
# 1. typescript-eslint mit peerDependencies.typescript >=6.1.0 verfügbar
# 2. vue-language-tools/Volar mit tsgo/TS7-Support (vuejs/language-tools#5381 resolved)
# 3. @nestjs/cli mit Compiler-API-Support für TS7 verfügbar
minimumReleaseAgeExclude:
  - eslint-plugin-vue@10.10.0
  - '@typescript-eslint/eslint-plugin@8.65.0'
  - '@typescript-eslint/parser@8.65.0'
  - '@typescript-eslint/project-service@8.65.0'
  - '@typescript-eslint/scope-manager@8.65.0'
  - '@typescript-eslint/tsconfig-utils@8.65.0'
  - '@typescript-eslint/type-utils@8.65.0'
  - '@typescript-eslint/types@8.65.0'
  - '@typescript-eslint/typescript-estree@8.65.0'
  - '@typescript-eslint/utils@8.65.0'
  - '@typescript-eslint/visitor-keys@8.65.0'
  - typescript-eslint@8.65.0
